[build]
builder = "nixpacks"
dockerfilePath = "Dockerfile.minimal"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5

[[deploy.services]]
name = "backend"

[deploy.services.env]
PYTHON_VERSION = "3.10"
USE_LIGHTWEIGHT_EMBEDDINGS = "true"
RAILWAY_ENVIRONMENT = "production"
